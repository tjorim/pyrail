name: Run Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: 3.12

    - name: Set up uv
      uses: astral-sh/setup-uv@v6

    - name: Install dependencies
      run: uv sync --only-group test --locked

    - name: Run tests
      run: uv run pytest
