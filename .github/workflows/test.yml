name: Run Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: 3.12

    - name: Set up uv
      uses: astral-sh/setup-uv@v6

    - name: Install dependencies
      run: |
        uv venv
        uv pip install -e . "pytest>=8.3.4,<10.0.0" "pytest-mock>=3.14.0,<4.0.0" "pytest-asyncio>=0.25.1,<1.4.0"

    - name: Run tests
      run: uv run pytest
