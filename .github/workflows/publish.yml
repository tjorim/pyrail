name: Publish to PyPI

on:
  push:
    tags:
      - "v*"  # Trigger on tags starting with 'v' (e.g., v1.0.0, v1.2.3)

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: 3.12

    - name: Set up uv
      uses: astral-sh/setup-uv@v6

    - name: Install dependencies
      run: uv sync --locked

    - name: Extract version from Git tag
      id: version
      run: |
        VERSION=$(echo ${GITHUB_REF} | sed 's/refs\/tags\/v//')  # Strip 'v' prefix
        echo "VERSION=$VERSION" >> $GITHUB_ENV

    - name: Bump version in pyproject.toml
      run: |
        python <<'PY'
        from pathlib import Path
        import re
        import os

        version = os.environ.get("VERSION")
        if not version:
            raise RuntimeError("VERSION environment variable is required but not set")
        pyproject = Path("pyproject.toml")
        content = pyproject.read_text()
        updated, updated_count = re.subn(
            r'(?m)^version = "[^"]+"$',
            f'version = "{version}"',
            content,
            count=1,
        )
        if updated_count != 1:
            raise RuntimeError(
                f"Expected exactly 1 version substitution in pyproject.toml, found {updated_count}"
            )
        pyproject.write_text(updated)
        PY

    - name: Push version bump to main
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git add pyproject.toml
        git commit -m "Bump version to $VERSION"
        git push origin HEAD:main  # Push from detached HEAD directly to main

    - name: Build the package
      run: uv build

    - name: Publish package to PyPI
      env:
        UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
      run: uv publish
