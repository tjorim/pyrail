name: Lint and Type Check

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: 3.12

    - name: Set up uv
      uses: astral-sh/setup-uv@v6

    - name: Install dependencies
      run: |
        uv venv
        uv pip install -e . "ruff>=0.15.12,<0.16.0" "ty==0.0.35"

    - name: Run Ruff
      run: uv run ruff check .

    - name: Run ty
      run: uv run ty check .
